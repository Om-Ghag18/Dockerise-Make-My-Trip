version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: travel_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: travel_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/travelapp
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: travel_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - ./frontend/.env

volumes:
  mongo_data:
